# Local development infrastructure for Unheard.
# Stack-neutral: Postgres + Redis + MinIO work whether the managed provider
# (Supabase vs Neon + S3) chosen in E0-6 lands later. Nothing here is production.
#
# Usage:
#   cp .env.example .env      # then edit if you like
#   docker compose up -d
#
# NOTE: these credentials are LOCAL-ONLY defaults. Real secrets go through the
# secrets manager (E0-5); never commit a real .env. (SEC-06)

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-unheard}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-unheard}
      POSTGRES_DB: ${POSTGRES_DB:-unheard}
    ports:
      - "5432:5432"
    volumes:
      - ./.data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-unheard}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]  # ephemeral: queue + rate-limit only
    ports:
      - "6379:6379"

  # MinIO = S3-compatible object store for MASKED audio (encrypted at rest in prod).
  minio:
    image: minio/minio:latest
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-unheard}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-unheard-local}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./.data/minio:/data
